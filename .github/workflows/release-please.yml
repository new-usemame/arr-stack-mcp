name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: python
          package-name: arr-stack-mcp
          token: ${{ secrets.GITHUB_TOKEN }}
