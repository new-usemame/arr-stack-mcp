name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build from (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.10.8"
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  pypi:
    name: publish to PyPI
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: pypi
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: build
        run: uv build

      - name: publish via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent on retries: if 0.1.0 is already on PyPI from an earlier
          # successful run, the action succeeds rather than erroring.
          skip-existing: true

  ghcr:
    name: build + push image to GHCR
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: pypi
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker buildx
        uses: docker/setup-buildx-action@v3

      - name: derive image tags
        id: tags
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-$RELEASE_TAG}"
          if [[ -z "$tag" ]]; then
            echo "no tag input or release tag available" >&2
            exit 1
          fi
          # Normalize: with-v vs without-v.
          if [[ "$tag" == v* ]]; then
            with_v="$tag"
            no_v="${tag#v}"
          else
            with_v="v$tag"
            no_v="$tag"
          fi
          # Skip latest for prereleases.
          if [[ "$tag" == *rc* || "$tag" == *beta* || "$tag" == *alpha* ]]; then
            latest_enabled=false
          else
            latest_enabled=true
          fi
          echo "with_v=$with_v"     >> "$GITHUB_OUTPUT"
          echo "no_v=$no_v"         >> "$GITHUB_OUTPUT"
          echo "latest=$latest_enabled" >> "$GITHUB_OUTPUT"
          echo "Will publish image tags: $with_v, $no_v, latest=$latest_enabled"

      - name: image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # `type=ref,event=tag` / `type=semver` only fire on real release
          # events, not on workflow_dispatch. The `type=raw` lines below cover
          # both — they read the normalized values from the previous step,
          # which itself accepts either an explicit `inputs.tag` (dispatch) or
          # falls back to `github.event.release.tag_name` (release-triggered).
          tags: |
            type=raw,value=${{ steps.tags.outputs.with_v }}
            type=raw,value=${{ steps.tags.outputs.no_v }}
            type=raw,value=latest,enable=${{ steps.tags.outputs.latest == 'true' }}

      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: cosign sign image
        run: |
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            cosign sign --yes "$tag"
          done
